# Add this via sudo visudo -f /etc/sudoers.d/terminal
# !!! Never edit sudoers files directly - always use visudo to catch syntax errors !!!
#
# Grants the 'terminal' service user passwordless sudo for exactly the
# commands the backend needs, nothing else is elevated

terminal ALL=(ALL) NOPASSWD: \
    /usr/local/bin/aerostream-beta.sh, \
    /usr/local/bin/aerostream-main.sh, \
    /usr/local/bin/pierce-beta.sh, \
    /usr/local/bin/pierce-main.sh, \
    /usr/local/bin/sync-coding-club-repo.sh, \
    /usr/local/bin/minecraft-backup.sh, \
    /usr/bin/systemctl start aerostream-proxy.service, \
    /usr/bin/systemctl stop aerostream-proxy.service, \
    /usr/bin/systemctl restart aerostream-proxy.service, \
    /usr/bin/systemctl start minecraft.service, \
    /usr/bin/systemctl stop minecraft.service, \
    /usr/local/bin/restart-git-sync.sh, \
    /usr/bin/systemctl stop git-sync