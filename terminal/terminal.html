<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>terminal.pierceoxley.ca</title>
        <link rel="stylesheet" href="styles.css">

        <link rel="icon" type="image/png" href="/terminal/assets/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/terminal/assets/favicon.svg" />
        <link rel="shortcut icon" href="/terminal/assets/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/terminal/assets/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Terminal" />
        <link rel="manifest" href="/terminal/assets/site.webmanifest" />
        
    </head>

    <body>
        <header>
            <h1>Terminal</h1>
            <div id="status-bar">
                <!-- Service status indicators populated by status.js -->

            </div>
        </header>

        <main>
            <section id="commands">
                <h2>Commands</h2>
                <div id="command-grid">
                    <!-- Populated by commands.js -->

                </div>
            </section>

            <section id="output">
                <h2>Output</h2>
                <pre id="output-log"></pre>
                
            </section>
        </main>

        <script src="scripts/commands.js" type="module"></script>
        <script src="scripts/status.js" type="module"></script>

    </body>
</html>
