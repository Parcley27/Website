server {
    server_name beta.pierceoxley.ca;
    root /var/www/beta.pierceoxley.ca/main;
    index pierceoxley.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /das/ {
        index das.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/beta.pierceoxley.ca/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/beta.pierceoxley.ca/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = beta.pierceoxley.ca) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name beta.pierceoxley.ca;
    return 404; # managed by Certbot


}