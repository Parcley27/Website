server {
    server_name git.pierceoxley.ca;
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/git.pierceoxley.ca/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/git.pierceoxley.ca/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location ~ ^(/[^/]+)(/.*)?$ {
        fastcgi_pass unix:/var/run/fcgiwrap.socket;
        fastcgi_param SCRIPT_FILENAME /usr/lib/git-core/git-http-backend;
        fastcgi_param GIT_HTTP_EXPORT_ALL "";
        fastcgi_param GIT_PROJECT_ROOT /var/git-repos;
        fastcgi_param PATH_INFO $uri;
        include fastcgi_params;
    }
}
server {
    if ($host = git.pierceoxley.ca) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name git.pierceoxley.ca;
    return 404; # managed by Certbot
}