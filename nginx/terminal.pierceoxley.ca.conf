# Depends on /etc/nginx/.htpasswd (create with htpasswd -c /etc/nginx/.htpasswd <username>)
# Backend: terminal-backend running on localhost:4028 (terminal-backend.service)

server {
    listen 80;
    listen [::]:80;
    server_name terminal.pierceoxley.ca;

    # Protect the entire subdomain with HTTP Basic Auth
    # nginx checks credentials here before any request reaches the backend
    auth_basic "Terminal";
    auth_basic_user_file /etc/nginx/.htpasswd;

    root /var/www/terminal.pierceoxley.ca;
    index terminal.html;

    # Static frontend
    location / {
        try_files $uri $uri/ =404;

    }

    # API proxy strips the /api prefix before forwarding to the backend
    # The backend itself has no auth because it relies entirely on nginx to gate access
    location /api/ {
        proxy_pass http://localhost:4028/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

    }
}